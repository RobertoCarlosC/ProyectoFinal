<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda – EnerGym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .filter-bar {
      background: var(--gris);
      border: 1px solid var(--borde);
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--borde);
      color: var(--texto2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.45rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 2px;
    }

    .filter-btn:hover, .filter-btn.active {
      color: var(--naranja);
      border-color: var(--naranja);
      background: rgba(255,85,0,0.08);
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap input {
      background: var(--gris2);
      border: 1px solid var(--borde);
      color: var(--texto);
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      width: 100%;
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      border-radius: 2px;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      outline: none;
      border-color: var(--naranja);
    }

    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  
  <div class="page-header">
    <div class="container">
      <p class="section-label">Catálogo completo</p>
      <h1 class="section-title">Nuestra <span style="color:var(--naranja)">Tienda</span></h1>
      <p style="color:var(--texto2);margin-top:0.5rem;" id="count-text">Cargando productos...</p>
    </div>
  </div>

  <div class="container pb-5">
    
    <div class="filter-bar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Buscar producto..." oninput="filterProductos()">
      </div>
      <div id="categoria-filters" style="display:flex;flex-wrap:wrap;gap:0.5rem;">
        <button class="filter-btn active" onclick="filterByCategoria(null, this)">Todos</button>
      </div>
      <select id="sort-select" class="form-control-dark" style="width:auto;padding:0.45rem 1rem;" onchange="filterProductos()">
        <option value="default">Ordenar por</option>
        <option value="precio-asc">Precio: menor a mayor</option>
        <option value="precio-desc">Precio: mayor a menor</option>
        <option value="nombre">Nombre A-Z</option>
      </select>
    </div>

    
    <div class="row" id="productos-grid">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-warning" role="status"></div>
        <p style="color:var(--texto2);margin-top:1rem;">Cargando productos...</p>
      </div>
    </div>
  </div>

  
  <footer>
    <div class="container text-center">
      <div class="footer-brand">Ener<span>Gym</span></div>
      <p class="footer-text mt-2">© 2025 EnerGym. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    window._activePage = 'tienda';
    injectNavbar('tienda');

    let allProductos = [];
    let categoriaActiva = null;

    async function loadProductos() {
      try {
        const user = getSession();
        const url = user ? `${API_BASE}/productos?idUsuario=${user.idUsuario}` : `${API_BASE}/productos`;
        const res = await fetch(url);
        allProductos = await res.json();

        document.getElementById('count-text').textContent = `${allProductos.length} productos disponibles`;
        await loadCategorias();
        renderProductos(allProductos);
      } catch (e) {
        document.getElementById('productos-grid').innerHTML = `
          <div class="col-12">
            <div class="empty-state">
              <div class="icon">⚠️</div>
              <h3>Error de conexión</h3>
              <p>No se pudo conectar con la API. Asegúrate de que el servidor está corriendo.</p>
            </div>
          </div>`;
        document.getElementById('count-text').textContent = '';
      }
    }

    async function loadCategorias() {
      try {
        const res = await fetch(`${API_BASE}/productos/categorias`);
        const cats = await res.json();
        const container = document.getElementById('categoria-filters');
        cats.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.textContent = cat.nombre;
          btn.onclick = () => filterByCategoria(cat.idCategoria, btn);
          container.appendChild(btn);
        });
      } catch (e) {}
    }

    function filterByCategoria(idCategoria, btn) {
      categoriaActiva = idCategoria;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterProductos();
    }

    function filterProductos() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const sort = document.getElementById('sort-select').value;

      let filtered = allProductos.filter(p => {
        const matchNombre = (p.nombre || '').toLowerCase().includes(search);
        const matchDesc = (p.descripcion || '').toLowerCase().includes(search);
        const matchCat = !categoriaActiva || p.idCategoria === categoriaActiva;
        return (matchNombre || matchDesc) && matchCat;
      });

      if (sort === 'precio-asc') filtered.sort((a, b) => a.precio - b.precio);
      else if (sort === 'precio-desc') filtered.sort((a, b) => b.precio - a.precio);
      else if (sort === 'nombre') filtered.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

      renderProductos(filtered);
      document.getElementById('count-text').textContent = `${filtered.length} producto${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}`;
    }

    function renderProductos(productos) {
      const grid = document.getElementById('productos-grid');
      if (!productos.length) {
        grid.innerHTML = `
          <div class="col-12">
            <div class="empty-state">
              <div class="icon">🔍</div>
              <h3>Sin resultados</h3>
              <p>No se encontraron productos con esos filtros</p>
            </div>
          </div>`;
        return;
      }
      grid.innerHTML = productos.map(renderProductCard).join('');
    }

    loadProductos();
  </script>
</body>
</html>
