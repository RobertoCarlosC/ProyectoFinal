<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – EnerGym</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: var(--negro); }

    .admin-sidebar {
      background: var(--oscuro);
      border-right: 1px solid var(--borde);
      height: 100vh;
      width: 220px;
      position: fixed;
      left: 0; top: 0;
      display: flex;
      flex-direction: column;
      z-index: 200;
    }

    .sidebar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--naranja);
      padding: 1.5rem;
      border-bottom: 1px solid var(--borde);
    }

    .sidebar-logo span { color: var(--blanco); }

    .sidebar-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--texto2);
      padding: 0.3rem 1.5rem 1rem;
      border-bottom: 1px solid var(--borde);
      margin-bottom: 0.5rem;
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      color: var(--texto2);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-left: 2px solid transparent;
    }

    .admin-nav-item:hover { color: var(--naranja); background: rgba(255,85,0,0.05); border-left-color: var(--naranja); }
    .admin-nav-item.active { color: var(--naranja); background: rgba(255,85,0,0.08); border-left-color: var(--naranja); }

    .sidebar-bottom {
      margin-top: auto;
      padding: 1.5rem;
      border-top: 1px solid var(--borde);
    }

    .admin-main {
      margin-left: 220px;
      min-height: 100vh;
      padding: 2rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--borde);
      margin-bottom: 2rem;
    }

    .admin-page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--blanco);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Tabla admin */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .admin-table th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--texto2);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--borde);
      text-align: left;
      font-weight: 600;
    }

    .admin-table td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--borde);
      vertical-align: middle;
    }

    .admin-table tr:hover td { background: rgba(255,255,255,0.02); }

    .admin-table img {
      width: 50px; height: 50px;
      object-fit: cover;
      border: 1px solid var(--borde);
      border-radius: 2px;
    }

    /* Form producto */
    .producto-form {
      background: var(--gris);
      border: 1px solid var(--borde);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .admin-sidebar { width: 60px; }
      .sidebar-logo, .sidebar-badge, .admin-nav-item span { display: none; }
      .admin-nav-item { justify-content: center; padding: 1rem; }
      .admin-main { margin-left: 60px; }
    }
  </style>
</head>
<body>
  
  <div class="admin-sidebar">
    <div class="sidebar-logo">Ener<span>Gym</span></div>
    <div class="sidebar-badge">Panel Admin</div>

    <nav>
      <div class="admin-nav-item active" onclick="showTab('productos', this)">
        <span>📦</span><span>Productos</span>
      </div>
      <div class="admin-nav-item" onclick="showTab('usuarios', this)">
        <span>👥</span><span>Usuarios</span>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;color:var(--texto2);margin-bottom:0.5rem;" id="admin-nombre"></div>
      <button onclick="logout()" class="btn-dark-sm w-100">Cerrar Sesión</button>
      <a href="/index.html" class="btn-dark-sm w-100 mt-2" style="display:block;text-align:center;">← Web</a>
    </div>
  </div>

  
  <div class="admin-main">

    
    <div class="tab-content active" id="tab-productos">
      <div class="admin-header">
        <h1 class="admin-page-title">Productos</h1>
        <button onclick="toggleForm()" class="btn-fire" style="clip-path:none;border-radius:2px;" id="btn-toggle-form">
          + Nuevo Producto
        </button>
      </div>

      
      <div class="producto-form" id="producto-form" style="display:none;">
        <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--blanco);margin-bottom:1.5rem;" id="form-title">
          Nuevo Producto
        </h3>
        <input type="hidden" id="edit-id">

        <div class="form-grid">
          <div>
            <label class="form-label-dark">Nombre *</label>
            <input type="text" id="prod-nombre" class="form-control-dark" placeholder="Nombre del producto">
          </div>
          <div>
            <label class="form-label-dark">Categoría *</label>
            <select id="prod-categoria" class="form-control-dark">
              <option value="">Seleccionar categoría</option>
            </select>
          </div>
          <div>
            <label class="form-label-dark">Precio (€) *</label>
            <input type="number" id="prod-precio" class="form-control-dark" placeholder="0.00" min="0" step="0.01">
          </div>
          <div>
            <label class="form-label-dark">Stock *</label>
            <input type="number" id="prod-stock" class="form-control-dark" placeholder="0" min="0">
          </div>
          <div class="col-span-2" style="grid-column:1/-1;">
            <label class="form-label-dark">Descripción</label>
            <textarea id="prod-descripcion" class="form-control-dark" rows="3" placeholder="Descripción del producto" style="resize:vertical;"></textarea>
          </div>
          <div class="col-span-2" style="grid-column:1/-1;">
            <label class="form-label-dark">URL Imagen</label>
            <input type="url" id="prod-imagen" class="form-control-dark" placeholder="https://...">
          </div>
        </div>

        <div style="display:flex;gap:1rem;margin-top:1.5rem;">
          <button onclick="guardarProducto()" class="btn-fire" style="clip-path:none;border-radius:2px;" id="btn-guardar">
            Guardar Producto
          </button>
          <button onclick="cancelarForm()" class="btn-dark-sm" style="padding:0.75rem 1.5rem;">
            Cancelar
          </button>
        </div>
      </div>

      
      <div style="background:var(--gris);border:1px solid var(--borde);overflow-x:auto;">
        <div id="productos-loading" class="text-center py-4">
          <div class="spinner-border text-warning" role="status"></div>
        </div>
        <table class="admin-table" id="productos-table" style="display:none;">
          <thead>
            <tr>
              <th>#</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="productos-tbody"></tbody>
        </table>
      </div>
    </div>

    
    <div class="tab-content" id="tab-usuarios">
      <div class="admin-header">
        <h1 class="admin-page-title">Usuarios</h1>
      </div>

      <!-- Formulario edición de usuarios -->
      <div class="producto-form" id="usuario-form" style="display:none;">
        <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--blanco);margin-bottom:1.5rem;" id="form-title-usuario">
          Editar Usuario
        </h3>
        <input type="hidden" id="edit-usuario-id">

        <div class="form-grid">
          <div>
            <label class="form-label-dark">Nombre *</label>
            <input type="text" id="usuario-nombre" class="form-control-dark" placeholder="Nombre del usuario">
          </div>
          <div>
            <label class="form-label-dark">Email *</label>
            <input type="email" id="usuario-email" class="form-control-dark" placeholder="email@example.com">
          </div>
          <div>
            <label class="form-label-dark">Rol *</label>
            <select id="usuario-rol" class="form-control-dark">
              <option value="">Seleccionar rol</option>
              <option value="2">Usuario</option>
              <option value="1">Admin</option>
            </select>
          </div>
        </div>

        <div style="display:flex;gap:1rem;margin-top:1.5rem;">
          <button onclick="guardarUsuario()" class="btn-fire" style="clip-path:none;border-radius:2px;" id="btn-guardar-usuario">
            Guardar Usuario
          </button>
          <button onclick="cancelarFormUsuario()" class="btn-dark-sm" style="padding:0.75rem 1.5rem;">
            Cancelar
          </button>
        </div>
      </div>

      <div style="background:var(--gris);border:1px solid var(--borde);overflow-x:auto;">
        <div id="usuarios-loading" class="text-center py-4">
          <div class="spinner-border text-warning" role="status"></div>
        </div>
        <table class="admin-table" id="usuarios-table" style="display:none;">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Registro</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usuarios-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  
  <div id="modal-delete" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:var(--gris);border:1px solid var(--borde);padding:2rem;max-width:400px;width:90%;">
      <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--blanco);margin-bottom:0.5rem;" id="modal-delete-titulo">Eliminar</h3>
      <p style="color:var(--texto2);margin-bottom:1.5rem;">¿Estás seguro? Esta acción no se puede deshacer.</p>
      <input type="hidden" id="modal-delete-tipo" value="producto">
      <div style="display:flex;gap:1rem;">
        <button onclick="closeDeleteModal()" class="btn-dark-sm" style="flex:1;padding:0.7rem;">Cancelar</button>
        <button onclick="confirmarEliminar()" style="flex:1;background:var(--rojo);color:var(--blanco);border:none;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;padding:0.7rem;cursor:pointer;border-radius:2px;" id="btn-delete-confirm">
          Eliminar
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Verificar admin
    const user = getSession();
    if (!user || user.idRol !== 1) {
      window.location.href = '/index.html';
    }

    document.getElementById('admin-nombre').textContent = user ? user.nombre : '';

    let productosCache = [];
    let deleteId = null;
    let categoriasCache = [];

    // ===== TABS =====
    function showTab(name, navEl) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(`tab-${name}`).classList.add('active');
      if (navEl) navEl.classList.add('active');

      if (name === 'usuarios') loadUsuarios();
    }

    // ===== PRODUCTOS =====
    async function loadProductos() {
      try {
        const res = await fetch(`${API_BASE}/productos`);
        productosCache = await res.json();
        renderProductosTable(productosCache);
        document.getElementById('productos-loading').style.display = 'none';
        document.getElementById('productos-table').style.display = 'table';
      } catch (e) {
        document.getElementById('productos-loading').innerHTML =
          '<p style="color:var(--texto2);padding:1rem;">Error al cargar productos</p>';
      }
    }

    function renderProductosTable(productos) {
      const tbody = document.getElementById('productos-tbody');
      if (!productos.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--texto2);padding:2rem;">Sin productos</td></tr>`;
        return;
      }
      tbody.innerHTML = productos.map(p => `
        <tr>
          <td style="color:var(--texto2);">#${p.idProducto}</td>
          <td>
            <img src="${p.imagen || 'https://via.placeholder.com/50x50/1a1a1a/ff5500?text=EG'}" alt="${p.nombre}"
                 onerror="this.src='https://via.placeholder.com/50x50/1a1a1a/ff5500?text=EG'">
          </td>
          <td style="font-weight:600;color:var(--blanco);">${p.nombre}</td>
          <td style="color:var(--naranja);font-family:'Barlow Condensed',sans-serif;">${p.nombreCategoria || '—'}</td>
          <td style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--naranja);">${formatPrice(p.precio)}</td>
          <td>
            <span class="${p.stock === 0 ? 'stock-badge stock-out' : p.stock < 5 ? 'stock-badge stock-low' : 'stock-badge stock-ok'}">
              ${p.stock}
            </span>
          </td>
          <td>
            <div style="display:flex;gap:0.5rem;">
              <button onclick="editarProducto(${p.idProducto})" class="btn-dark-sm">✏️ Editar</button>
              <button onclick="openDeleteModal(${p.idProducto})" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--rojo);font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:1px;text-transform:uppercase;padding:0.4rem 0.8rem;cursor:pointer;border-radius:2px;transition:all 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.2)'" onmouseout="this.style.background='rgba(239,68,68,0.1)'">🗑️ Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function loadCategorias() {
      try {
        const res = await fetch(`${API_BASE}/productos/categorias`);
        categoriasCache = await res.json();
        const select = document.getElementById('prod-categoria');
        categoriasCache.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.idCategoria;
          opt.textContent = c.nombre;
          select.appendChild(opt);
        });
      } catch (e) {}
    }

    function toggleForm() {
      const form = document.getElementById('producto-form');
      const isVisible = form.style.display !== 'none';
      if (isVisible) {
        cancelarForm();
      } else {
        document.getElementById('form-title').textContent = 'Nuevo Producto';
        document.getElementById('edit-id').value = '';
        document.getElementById('btn-guardar').textContent = 'Guardar Producto';
        clearForm();
        form.style.display = 'block';
        document.getElementById('btn-toggle-form').textContent = '× Cancelar';
      }
    }

    function cancelarForm() {
      document.getElementById('producto-form').style.display = 'none';
      document.getElementById('btn-toggle-form').textContent = '+ Nuevo Producto';
      clearForm();
    }

    function clearForm() {
      ['prod-nombre','prod-precio','prod-stock','prod-descripcion','prod-imagen'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('prod-categoria').value = '';
      document.getElementById('edit-id').value = '';
    }

    function editarProducto(id) {
      const p = productosCache.find(x => x.idProducto === id);
      if (!p) return;

      document.getElementById('edit-id').value = id;
      document.getElementById('prod-nombre').value = p.nombre || '';
      document.getElementById('prod-precio').value = p.precio || '';
      document.getElementById('prod-stock').value = p.stock || '';
      document.getElementById('prod-descripcion').value = p.descripcion || '';
      document.getElementById('prod-imagen').value = p.imagen || '';
      document.getElementById('prod-categoria').value = p.idCategoria || '';

      document.getElementById('form-title').textContent = 'Editar Producto';
      document.getElementById('btn-guardar').textContent = 'Actualizar Producto';

      const form = document.getElementById('producto-form');
      form.style.display = 'block';
      form.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('btn-toggle-form').textContent = '× Cancelar';
    }

    async function guardarProducto() {
      const editId = document.getElementById('edit-id').value;
      const nombre = document.getElementById('prod-nombre').value.trim();
      const precio = parseFloat(document.getElementById('prod-precio').value);
      const stock = parseInt(document.getElementById('prod-stock').value);
      const descripcion = document.getElementById('prod-descripcion').value.trim();
      const imagen = document.getElementById('prod-imagen').value.trim();
      const idCategoria = parseInt(document.getElementById('prod-categoria').value);

      if (!nombre || !precio || isNaN(stock) || !idCategoria) {
        showToast('Completa todos los campos obligatorios (*)', 'error');
        return;
      }

      const btn = document.getElementById('btn-guardar');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      const body = { nombre, descripcion, precio, stock, imagen, idCategoria };

      try {
        const url = editId ? `${API_BASE}/productos/${editId}` : `${API_BASE}/productos`;
        const method = editId ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Error al guardar', 'error');
        } else {
          showToast(editId ? 'Producto actualizado ✓' : 'Producto creado ✓', 'success');
          cancelarForm();
          await loadProductos();
        }
      } catch (e) {
        showToast('Error de conexión', 'error');
      }

      btn.disabled = false;
      btn.textContent = editId ? 'Actualizar Producto' : 'Guardar Producto';
    }

    function openDeleteModal(id) {
      deleteId = id;
      const p = productosCache.find(x => x.idProducto === id);
      document.getElementById('modal-delete-titulo').textContent = `Eliminar Producto: ${p ? p.nombre : ''}`;
      document.getElementById('modal-delete-tipo').value = 'producto';
      document.getElementById('modal-delete').style.display = 'flex';
    }

    function closeDeleteModal() {
      deleteUsuarioId = null;
      deleteId = null;
      document.getElementById('modal-delete').style.display = 'none';
    }



    // ===== USUARIOS =====
    let usuariosCache = [];
    let deleteUsuarioId = null;

    async function loadUsuarios() {
      document.getElementById('usuarios-loading').style.display = 'block';
      document.getElementById('usuarios-table').style.display = 'none';

      try {
        const adminUser = getSession();
        if (!adminUser) {
          throw new Error('Usuario no autenticado');
        }

        const res = await fetch(`${API_BASE}/admin/${adminUser.idUsuario}/usuarios/todos`);
        
        if (!res.ok) {
          const errorData = await res.json();
          throw new Error(errorData.error || `Error ${res.status}`);
        }

        const usuarios = await res.json();
        usuariosCache = usuarios;

        const tbody = document.getElementById('usuarios-tbody');
        if (!usuarios || !usuarios.length) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--texto2);padding:2rem;">Sin usuarios</td></tr>`;
          document.getElementById('usuarios-loading').style.display = 'none';
          document.getElementById('usuarios-table').style.display = 'table';
          return;
        }

        tbody.innerHTML = usuarios.map(u => `
          <tr>
            <td style="color:var(--texto2);">#${u.idUsuario}</td>
            <td style="font-weight:600;color:var(--blanco);">${u.nombre}</td>
            <td style="color:var(--texto2);">${u.email}</td>
            <td>
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:2px;${u.rol === 'admin' || u.rol === 'Admin' ? 'background:rgba(255,85,0,0.15);color:var(--naranja)' : 'background:rgba(255,255,255,0.05);color:var(--texto2)'}">
                ${u.rol || 'usuario'}
              </span>
            </td>
            <td style="color:var(--texto2);font-size:0.85rem;">
              ${new Date(u.fechaRegistro).toLocaleDateString('es-ES')}
            </td>
            <td>
              <div style="display:flex;gap:0.5rem;">
                <button onclick="editarUsuario(${u.idUsuario})" class="btn-dark-sm">✏️ Editar</button>
                <button onclick="openDeleteUsuarioModal(${u.idUsuario})" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--rojo);font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:1px;text-transform:uppercase;padding:0.4rem 0.8rem;cursor:pointer;border-radius:2px;transition:all 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.2)'" onmouseout="this.style.background='rgba(239,68,68,0.1)'">🗑️ Eliminar</button>
              </div>
            </td>
          </tr>
        `).join('');

        document.getElementById('usuarios-loading').style.display = 'none';
        document.getElementById('usuarios-table').style.display = 'table';
      } catch (e) {
        console.error('Error loadUsuarios:', e);
        document.getElementById('usuarios-loading').innerHTML =
          `<p style="color:var(--rojo);padding:1rem;">❌ Error: ${e.message}</p>`;
      }
    }

    function editarUsuario(id) {
      const u = usuariosCache.find(x => x.idUsuario === id);
      if (!u) return;

      document.getElementById('edit-usuario-id').value = id;
      document.getElementById('usuario-nombre').value = u.nombre || '';
      document.getElementById('usuario-email').value = u.email || '';
      document.getElementById('usuario-rol').value = u.idRol || '';

      document.getElementById('form-title-usuario').textContent = `Editar Usuario: ${u.nombre}`;
      document.getElementById('btn-guardar-usuario').textContent = 'Actualizar Usuario';

      const form = document.getElementById('usuario-form');
      form.style.display = 'block';
      form.scrollIntoView({ behavior: 'smooth' });
    }

    function cancelarFormUsuario() {
      document.getElementById('usuario-form').style.display = 'none';
      clearFormUsuario();
    }

    function clearFormUsuario() {
      ['usuario-nombre','usuario-email'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('usuario-rol').value = '';
      document.getElementById('edit-usuario-id').value = '';
    }

    async function guardarUsuario() {
      const editId = parseInt(document.getElementById('edit-usuario-id').value);
      const nombre = document.getElementById('usuario-nombre').value.trim();
      const email = document.getElementById('usuario-email').value.trim();
      const idRol = parseInt(document.getElementById('usuario-rol').value);

      if (!nombre || !email || !idRol) {
        showToast('Completa todos los campos obligatorios (*)', 'error');
        return;
      }

      const btn = document.getElementById('btn-guardar-usuario');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      const adminUser = getSession();
      const body = { 
        idUsuario: editId,
        nombre, 
        email, 
        idRol
      };

      try {
        const res = await fetch(`${API_BASE}/admin/${adminUser.idUsuario}/usuarios/${editId}/editar`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Error al guardar', 'error');
        } else {
          showToast('Usuario actualizado ✓', 'success');
          cancelarFormUsuario();
          await loadUsuarios();
        }
      } catch (e) {
        console.error(e);
        showToast('Error de conexión', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Actualizar Usuario';
    }

    function openDeleteUsuarioModal(id) {
      const adminUser = getSession();
      
      // Validar que no intente eliminar su propia cuenta
      if (adminUser.idUsuario === id) {
        showToast('❌ No puedes eliminar tu propia cuenta', 'error');
        return;
      }

      deleteUsuarioId = id;
      const u = usuariosCache.find(x => x.idUsuario === id);
      document.getElementById('modal-delete-titulo').textContent = `Eliminar Usuario: ${u ? u.nombre : ''}`;
      document.getElementById('modal-delete-tipo').value = 'usuario';
      document.getElementById('modal-delete').style.display = 'flex';
    }

    async function confirmarEliminar() {
      const tipoDelete = document.getElementById('modal-delete-tipo').value;
      const idToDelete = tipoDelete === 'usuario' ? deleteUsuarioId : deleteId;

      if (!idToDelete) {
        console.error('No ID to delete');
        return;
      }

      const btn = document.getElementById('btn-delete-confirm');
      btn.textContent = 'Eliminando...';
      btn.disabled = true;

      const adminUser = getSession();

      try {
        let url;
        if (tipoDelete === 'usuario') {
          url = `${API_BASE}/admin/${adminUser.idUsuario}/usuarios/${idToDelete}`;
          console.log('Deleting user:', url);
        } else {
          url = `${API_BASE}/admin/${adminUser.idUsuario}/productos/${idToDelete}`;
          console.log('Deleting product:', url);
        }

        const res = await fetch(url, { method: 'DELETE' });
        
        let data;
        try {
          data = await res.json();
        } catch (parseError) {
          console.error('Error parsing response:', parseError);
          data = { error: 'Error al procesar la respuesta del servidor' };
        }

        console.log('Response status:', res.status, 'Data:', data);

        if (!res.ok) {
          showToast(data.error || `Error ${res.status}: No se pudo eliminar`, 'error');
        } else {
          const tipo = tipoDelete === 'usuario' ? 'Usuario' : 'Producto';
          showToast(`${tipo} eliminado ✓`, 'success');
          closeDeleteModal();
          if (tipoDelete === 'usuario') {
            await loadUsuarios();
          } else {
            await loadProductos();
          }
        }
      } catch (e) {
        console.error('Delete error:', e);
        showToast(`Error: ${e.message}`, 'error');
      }

      btn.textContent = 'Eliminar';
      btn.disabled = false;
    }

    // Init
    loadProductos();
    loadCategorias();
  </script>
</body>
</html>
