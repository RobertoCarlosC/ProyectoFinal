<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro – EnerGym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(255,85,0,0.07) 0%, transparent 60%),
        var(--negro);
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="auth-bg">
    <div class="container">
      <div class="auth-card">
        <div style="text-align:center;margin-bottom:2rem;">
          <a href="/index.html" style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;color:var(--naranja);text-decoration:none;">
            Ener<span style="color:var(--blanco)">Gym</span>
          </a>
        </div>
        <h1 class="auth-title">Crear Cuenta</h1>
        <p class="auth-sub">Únete a la comunidad EnerGym</p>

        <form id="registro-form">
          <div class="mb-4">
            <label class="form-label-dark">Nombre completo</label>
            <input type="text" id="nombre" class="form-control-dark" placeholder="Tu nombre" required>
          </div>
          <div class="mb-4">
            <label class="form-label-dark">Email</label>
            <input type="email" id="email" class="form-control-dark" placeholder="tu@email.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label-dark">Contraseña</label>
            <input type="password" id="password" class="form-control-dark" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label-dark">Confirmar contraseña</label>
            <input type="password" id="password2" class="form-control-dark" placeholder="Repite la contraseña" required>
          </div>

          <div id="error-msg" style="display:none;background:rgba(239,68,68,0.1);border:1px solid var(--rojo);color:var(--rojo);padding:0.75rem 1rem;font-size:0.85rem;margin-bottom:1rem;border-radius:2px;"></div>
          <div id="success-msg" style="display:none;background:rgba(34,197,94,0.1);border:1px solid var(--verde);color:var(--verde);padding:0.75rem 1rem;font-size:0.85rem;margin-bottom:1rem;border-radius:2px;"></div>

          <button type="submit" class="btn-fire w-100" style="clip-path:none;border-radius:2px;" id="btn-registro">
            Crear Cuenta
          </button>
        </form>

        <div class="divider-fire mt-4">
          <span>¿Ya tienes cuenta?</span>
        </div>

        <a href="/pages/login.html" class="btn-outline-fire w-100" style="text-align:center;display:block;">
          Iniciar sesión
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    injectNavbar('registro');

    if (getSession()) window.location.href = '/index.html';

    document.getElementById('registro-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-registro');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (password !== password2) {
        errorEl.textContent = 'Las contraseñas no coinciden';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres';
        errorEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Creando cuenta...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Error al registrarse';
          errorEl.style.display = 'block';
          btn.textContent = 'Crear Cuenta';
          btn.disabled = false;
          return;
        }

        successEl.textContent = '¡Cuenta creada! Redirigiendo al login...';
        successEl.style.display = 'block';

        setTimeout(() => {
          window.location.href = '/pages/login.html';
        }, 1500);
      } catch (err) {
        errorEl.textContent = 'Error de conexión con el servidor';
        errorEl.style.display = 'block';
        btn.textContent = 'Crear Cuenta';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
