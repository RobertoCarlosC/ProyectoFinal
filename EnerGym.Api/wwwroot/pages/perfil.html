<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi Perfil – EnerGym</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="page-account-body">
  <div id="navbar-placeholder"></div>

  <main class="page-account reveal">
    <header class="page-header page-header--account">
      <p class="section-label">Usuario</p>
      <h1 class="section-title section-title--cart"><span class="first-word">Mi</span> <span class="second-word">Perfil</span></h1>
    </header>

    <div class="account-layout reveal-stagger">
      <div class="account-main">
        <section class="account-panel">
          <h2 class="account-panel__title">Información personal</h2>

          <div class="account-form-grid">
            <div>
              <label class="form-label-dark" for="nombre">Nombre</label>
              <input id="nombre" type="text" class="form-control-dark" autocomplete="name">
            </div>
            <div>
              <label class="form-label-dark" for="email">Email</label>
              <input id="email" type="email" class="form-control-dark" autocomplete="email">
            </div>
            <div>
              <label class="form-label-dark" for="telefono">Teléfono</label>
              <input id="telefono" type="tel" class="form-control-dark" placeholder="+34 600 000 000" autocomplete="tel">
            </div>
            <div>
              <label class="form-label-dark" for="direccion">Dirección</label>
              <input id="direccion" type="text" class="form-control-dark" placeholder="Calle, nº, puerta" autocomplete="street-address">
            </div>
            <div>
              <label class="form-label-dark" for="ciudad">Ciudad</label>
              <input id="ciudad" type="text" class="form-control-dark" autocomplete="address-level2">
            </div>
            <div>
              <label class="form-label-dark" for="codigoPostal">Código postal</label>
              <input id="codigoPostal" type="text" class="form-control-dark" autocomplete="postal-code">
            </div>
          </div>

          <div style="margin-top:1.75rem;">
            <button type="button" onclick="guardarPerfil()" class="btn-fire" style="clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);">Guardar cambios</button>
          </div>
        </section>

        <section class="account-panel">
          <h2 class="account-panel__title">Cambiar contraseña</h2>

          <div style="max-width:440px;">
            <div class="mb-3">
              <label class="form-label-dark" for="pwd-actual">Contraseña actual</label>
              <input id="pwd-actual" type="password" class="form-control-dark" autocomplete="current-password">
            </div>
            <div class="mb-3">
              <label class="form-label-dark" for="pwd-nueva">Nueva contraseña</label>
              <input id="pwd-nueva" type="password" class="form-control-dark" autocomplete="new-password">
            </div>
            <div class="mb-3">
              <label class="form-label-dark" for="pwd-confirmar">Confirmar nueva contraseña</label>
              <input id="pwd-confirmar" type="password" class="form-control-dark" autocomplete="new-password">
            </div>
            <button type="button" onclick="cambiarContraseña()" class="btn-fire" style="clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);">Cambiar contraseña</button>
          </div>
        </section>
      </div>

      <aside class="account-sidebar">
        <div class="account-sidebar__title">Mis pedidos</div>

        <div id="pedidos-lista" style="max-height:560px;overflow-y:auto;">
          <div class="eg-spinner"></div>
        </div>

        <button type="button" onclick="irATienda()" class="btn-outline-fire w-100 mt-3">Volver a la tienda</button>
      </aside>
    </div>
  </main>

  <div id="toast-container"></div>

  <script src="/js/app.js"></script>

  <script>
    window._activePage = 'perfil';

    document.addEventListener('DOMContentLoaded', async () => {
      injectNavbar('perfil');
      const user = getSession();
      if (!user) {
        window.location.href = '/pages/login.html';
        return;
      }
      await cargarPerfil();
      await cargarPedidos();
    });

    async function cargarPerfil() {
      try {
        const user = getSession();
        const res = await fetch(`/api/usuarios/${user.idUsuario}/perfil`);
        if (!res.ok) throw new Error();
        const perfil = await res.json();

        document.getElementById('nombre').value = perfil.nombre || '';
        document.getElementById('email').value = perfil.email || '';
        document.getElementById('telefono').value = perfil.telefono || '';
        document.getElementById('direccion').value = perfil.direccion || '';
        document.getElementById('ciudad').value = perfil.ciudad || '';
        document.getElementById('codigoPostal').value = perfil.codigoPostal || '';
      } catch (e) {
        showToast('Error al cargar el perfil', 'error');
      }
    }

    async function cargarPedidos() {
      try {
        const user = getSession();
        const res = await fetch(`/api/usuarios/${user.idUsuario}/pedidos`);
        if (!res.ok) throw new Error();
        const pedidos = await res.json();

        const lista = document.getElementById('pedidos-lista');
        if (pedidos.length === 0) {
          lista.innerHTML = '<p style="color:var(--smoke);text-align:center;font-family:var(--font-cond);font-size:13px;">No tienes pedidos aún</p>';
          return;
        }

        let html = '';
        pedidos.forEach(p => {
          const estadoBadge = `<span style="background:${p.estado === 'Entregado' ? '#22c55e' : 'var(--red)'};color:var(--white);padding:0.25rem 0.6rem;border-radius:2px;font-size:0.7rem;font-family:var(--font-cond);letter-spacing:0.06em;text-transform:uppercase;">${escapeHtml(p.estado)}</span>`;
          html += `
            <div class="pedido-card-mini" onclick="verDetallePedido(${p.idPedido})">
              <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:0.5rem;">
                <strong style="font-family:var(--font-cond);letter-spacing:0.08em;color:var(--white);">#${p.idPedido}</strong>
                ${estadoBadge}
              </div>
              <div style="color:var(--smoke);font-size:0.85rem;margin-bottom:0.5rem;font-family:var(--font-body);">${new Date(p.fecha).toLocaleDateString('es-ES')}</div>
              <div style="font-weight:700;color:var(--red);font-family:var(--font-impact);font-size:1.35rem;letter-spacing:0.04em;">${formatPrice(p.total)}</div>
            </div>`;
        });

        lista.innerHTML = html;
      } catch (e) {
        showToast('Error al cargar pedidos', 'error');
      }
    }

    async function guardarPerfil() {
      const user = getSession();
      const datos = {
        idUsuario: user.idUsuario,
        nombre: document.getElementById('nombre').value.trim(),
        email: document.getElementById('email').value.trim(),
        telefono: document.getElementById('telefono').value.trim() || null,
        direccion: document.getElementById('direccion').value.trim() || null,
        ciudad: document.getElementById('ciudad').value.trim() || null,
        codigoPostal: document.getElementById('codigoPostal').value.trim() || null
      };

      if (!datos.nombre || !datos.email) {
        showToast('Nombre y Email son obligatorios', 'error');
        return;
      }

      try {
        const res = await fetch(`/api/usuarios/${user.idUsuario}/editar-perfil`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(datos)
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error || 'Error al guardar');
        }

        showToast('Perfil actualizado correctamente ✓', 'success');
        setSession({ ...user, nombre: datos.nombre, email: datos.email });
        injectNavbar('perfil');
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    async function cambiarContraseña() {
      const user = getSession();
      const actual = document.getElementById('pwd-actual').value.trim();
      const nueva = document.getElementById('pwd-nueva').value.trim();
      const confirmar = document.getElementById('pwd-confirmar').value.trim();

      if (!actual || !nueva || !confirmar) {
        showToast('Todos los campos son obligatorios', 'error');
        return;
      }

      if (nueva !== confirmar) {
        showToast('Las contraseñas no coinciden', 'error');
        return;
      }

      if (nueva.length < 6) {
        showToast('La contraseña debe tener al menos 6 caracteres', 'error');
        return;
      }

      try {
        const res = await fetch(`/api/usuarios/${user.idUsuario}/cambiar-contraseña`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            idUsuario: user.idUsuario,
            contraseñaActual: actual,
            contraseñaNueva: nueva,
            confirmarContraseña: confirmar
          })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error || 'Error al cambiar');
        }

        showToast('Contraseña cambiada correctamente ✓', 'success');
        document.getElementById('pwd-actual').value = '';
        document.getElementById('pwd-nueva').value = '';
        document.getElementById('pwd-confirmar').value = '';
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    function verDetallePedido(idPedido) {
      window.location.href = `/pages/pedido.html?id=${idPedido}`;
    }

    function irATienda() {
      window.location.href = '/pages/tienda.html';
    }
  </script>
</body>
</html>
