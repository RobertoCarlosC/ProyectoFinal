<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnerGym – Acceso</title>
<link rel="stylesheet" href="/css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="noise"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Ener<span>Gym</span></div>
    <div class="auth-subtitle">Suplementación de élite</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
    </div>

    
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-auth" id="btn-login">Iniciar Sesión</button>
      <div class="auth-msg" id="login-msg"></div>
    </form>

    
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn-auth" id="btn-register">Crear cuenta</button>
      <div class="auth-msg" id="register-msg"></div>
    </form>

    <a href="/index.html" class="auth-back">← Volver a la tienda</a>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  const sesionActiva = getSession();
  if (sesionActiva) {
    window.location.href = sesionActiva.idRol === 1 ? '/pages/admin.html' : '/index.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
    document.getElementById('login-msg').className = 'auth-msg';
    document.getElementById('register-msg').className = 'auth-msg';
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'auth-msg ' + type;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      const res  = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showMsg('login-msg', data.error || 'Email o contraseña incorrectos.', 'error');
        return;
      }
      setSession(data);
      await updateCartBadge();
      window.location.href = data.idRol === 1 ? '/pages/admin.html' : '/index.html';
    } catch (err) {
      showMsg('login-msg', 'No se pudo conectar con el servidor.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Iniciar Sesión';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.textContent = 'Creando cuenta...';

    const nombre   = document.getElementById('reg-nombre').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    try {
      const res  = await fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showMsg('register-msg', data.error || 'Error al registrarse.', 'error');
        return;
      }
      showMsg('register-msg', '¡Cuenta creada! Ahora inicia sesión.', 'success');
      document.getElementById('login-email').value = email;
      setTimeout(() => switchTab('login'), 1200);
    } catch (err) {
      showMsg('register-msg', 'No se pudo conectar con el servidor.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Crear cuenta';
    }
  }
</script>
</body>
</html>
