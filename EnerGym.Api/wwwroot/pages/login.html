<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – EnerGym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background:
        radial-gradient(ellipse at 70% 50%, rgba(255,85,0,0.07) 0%, transparent 60%),
        var(--negro);
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="auth-bg">
    <div class="container">
      <div class="auth-card">

        <div style="text-align:center;margin-bottom:2rem;">
          <a href="/index.html"
             style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;color:var(--naranja);text-decoration:none;">
            Ener<span style="color:var(--blanco)">Gym</span>
          </a>
        </div>

        <h1 class="auth-title">Bienvenido</h1>
        <p class="auth-sub">Inicia sesión en tu cuenta</p>

        
        <div id="error-msg"
             style="display:none;background:rgba(239,68,68,0.1);border:1px solid var(--rojo);
                    color:var(--rojo);padding:0.75rem 1rem;font-size:0.9rem;
                    margin-bottom:1rem;border-radius:2px;">
        </div>

        <form id="login-form" novalidate>
          <div class="mb-4">
            <label class="form-label-dark">Email</label>
            <input type="email" id="email" class="form-control-dark"
                   placeholder="tu@email.com" required autocomplete="email">
          </div>
          <div class="mb-4">
            <label class="form-label-dark">Contraseña</label>
            <input type="password" id="password" class="form-control-dark"
                   placeholder="••••••••" required autocomplete="current-password">
          </div>

          <button type="submit" id="btn-login"
                  class="btn-fire w-100" style="clip-path:none;border-radius:2px;">
            Iniciar Sesión
          </button>
        </form>

        <div class="divider-fire mt-4">
          <span>¿No tienes cuenta?</span>
        </div>

        <a href="/pages/registro.html" class="btn-outline-fire w-100"
           style="text-align:center;display:block;">
          Crear cuenta gratis
        </a>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    injectNavbar('login');

    // Si ya hay sesión activa, redirigir
    const sesionActiva = getSession();
    if (sesionActiva) {
      window.location.href = sesionActiva.idRol === 1 ? '/pages/admin.html' : '/index.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn     = document.getElementById('btn-login');
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Por favor, rellena email y contraseña.';
        errorEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Entrando...';
      btn.disabled    = true;

      try {
        // POST /api/login  →  { idUsuario, nombre, email, idRol }
        const res = await fetch(`${API_BASE}/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          // La API devuelve { error: "..." }
          errorEl.textContent = data.error || 'Email o contraseña incorrectos.';
          errorEl.style.display = 'block';
          btn.textContent = 'Iniciar Sesión';
          btn.disabled    = false;
          return;
        }

        // Guardar sesión en localStorage
        // data = { idUsuario, nombre, email, idRol }
        setSession(data);
        await updateCartBadge();

        // Redirigir según rol:
        //   idRol = 1 → admin.html
        //   idRol = 2 → index.html (cliente)
        if (data.idRol === 1) {
          window.location.href = '/pages/admin.html';
        } else {
          window.location.href = '/index.html';
        }

      } catch (err) {
        errorEl.textContent = 'Error de conexión con el servidor. Verifica que la API esté corriendo.';
        errorEl.style.display = 'block';
        btn.textContent = 'Iniciar Sesión';
        btn.disabled    = false;
      }
    });
  </script>
</body>
</html>
